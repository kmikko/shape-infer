name: Changesets

on:
  push:
    branches: [main]

jobs:
  version:
    name: Version packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Required so changesets can diff against the previous commit
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Pre-create $HOME/.npmrc so changesets/action does not overwrite the
      # OIDC-capable .npmrc that setup-node wrote with an NPM_TOKEN entry.
      - name: Preserve .npmrc for OIDC
        run: touch "$HOME/.npmrc"

      - name: Version or publish
        uses: changesets/action@v1
        with:
          # When pending changesets exist: bumps package.json + CHANGELOG.md
          # and opens (or updates) a "Version Packages" PR.
          # When the version PR is merged and the version isn't on npm yet:
          # publishes to npm and creates a GitHub Release automatically.
          version: pnpm changeset version
          publish: pnpm changeset publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}
